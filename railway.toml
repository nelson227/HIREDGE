[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"
watchPatterns = ["hiredge/apps/api/**", "hiredge/packages/**"]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
numReplicas = 1

# Railway va automatiquement utiliser le Dockerfile dans hiredge/
# Variables à configurer dans le Dashboard Railway :
# - DATABASE_URL (fourni par Railway PostgreSQL)
# - REDIS_URL (fourni par Railway Redis)
# - JWT_SECRET
# - JWT_REFRESH_SECRET  
# - CORS_ORIGIN (URL Vercel)
# - OPENAI_API_KEY
