version: '3.8'

services:
  # ─── PostgreSQL ────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hiredge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hiredge
      POSTGRES_USER: hiredge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hiredge']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hiredge-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── API Backend ───────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hiredge-api
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://hiredge:${POSTGRES_PASSWORD}@postgres:5432/hiredge
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─── Prisma Migrate (one-shot) ─────────────────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hiredge-migrate
    environment:
      DATABASE_URL: postgresql://hiredge:${POSTGRES_PASSWORD}@postgres:5432/hiredge
    command: ['npx', 'prisma', 'migrate', 'deploy', '--schema=apps/api/prisma/schema.prisma']
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
